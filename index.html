<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>rba | fit</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E💪%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0a0a0a;
            --bg2: #141414;
            --bg3: #1a1a1a;
            --border: #252525;
            --border2: #333;
            --text: #e0ddd8;
            --text2: #b0b0b0;
            --text3: #777;
            --accent: #d4a43a;
            --accent2: #e8b84a;
            --green: #4ade80;
            --green2: #22c55e;
            --red: #f87171;
            --blue: #60a5fa;
            --orange: #fb923c;
            --purple: #a78bfa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        #app { max-width: 520px; margin: 0 auto; padding: 12px 16px 60px; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
        input { font-family: inherit; }
        .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
        .logo-row { display: flex; align-items: center; gap: 10px; }
        .logo { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--orange)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: #000; letter-spacing: -0.3px; text-transform: lowercase; }
        .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
        .header-sub { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
        .top-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--accent); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        /* Progress */
        .prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .prog-label { font-size: 11px; color: var(--text3); width: 58px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.05em; }
        .prog-track { flex: 1; height: 5px; border-radius: 3px; background: var(--bg3); }
        .prog-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
        .prog-pct { font-size: 12px; font-weight: 700; width: 34px; text-align: right; font-variant-numeric: tabular-nums; }
        /* Week nav */
        .week-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 8px; }
        .nav-btn { background: var(--bg3); border: 1px solid var(--border); width: 36px; height: 36px; border-radius: 8px; font-size: 20px; display: flex; align-items: center; justify-content: center; color: var(--text); }
        .nav-btn:disabled { opacity: 0.3; }
        .week-center { text-align: center; }
        .week-label { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; }
        .phase-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
        .date-range { font-size: 11px; color: var(--text2); margin-top: 1px; }
        /* Pills */
        .pills { display: flex; gap: 3px; margin-bottom: 14px; justify-content: center; flex-wrap: wrap; }
        .pill { width: 28px; height: 26px; border-radius: 6px; font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .pill-active { background: var(--text); color: var(--bg); font-weight: 700; }
        .pill-inactive { color: var(--text3); }
        /* Intensity map */
        .int-map { margin-bottom: 14px; padding: 8px 12px; background: var(--bg2); border-radius: 8px; border: 1px solid var(--border); }
        .int-title { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
        .int-row { display: flex; justify-content: space-between; }
        .int-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .int-dot { width: 22px; height: 5px; border-radius: 3px; }
        .int-cell-label { font-size: 9px; color: var(--text3); }
        /* Day cards */
        .day-cards { display: flex; flex-direction: column; gap: 6px; }
        .day-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; text-align: left; width: 100%; transition: border-color 0.15s; }
        .day-card:active { border-color: var(--accent); }
        .day-card-top { display: flex; align-items: center; gap: 10px; }
        .day-card-icon { font-size: 20px; flex-shrink: 0; }
        .day-card-info { flex: 1; }
        .day-card-day { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
        .day-card-title { font-size: 14px; font-weight: 600; color: var(--text); }
        .day-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
        .badge { padding: 2px 7px; border-radius: 4px; font-size: 9px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.03em; }
        .day-card-dur { font-size: 10px; color: var(--text3); }
        .day-prog { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .day-prog-track { flex: 1; height: 3px; border-radius: 2px; background: var(--bg3); }
        .day-prog-fill { height: 100%; border-radius: 2px; background: var(--green2); transition: width 0.3s; }
        .day-prog-pct { font-size: 10px; color: var(--text3); font-variant-numeric: tabular-nums; }
        /* Day detail */
        .detail-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
        .back-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 13px; flex-shrink: 0; margin-top: 2px; }
        .detail-title { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; }
        .detail-meta { font-size: 12px; color: var(--text2); margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .equip-note { font-size: 11px; color: var(--accent); margin-top: 3px; }
        .block-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
        .block { margin-bottom: 14px; }
        .item { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid #1a1a1a; align-items: flex-start; }
        .chk { font-size: 18px; padding: 0; margin-top: 1px; flex-shrink: 0; width: 22px; text-align: center; }
        .item-text { font-size: 13px; line-height: 1.5; color: var(--text); }
        .item-done .item-text { text-decoration: line-through; color: var(--text3); }
        .item-acts { display: flex; gap: 5px; margin-top: 3px; flex-wrap: wrap; }
        .act-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 2px 7px; border-radius: 4px; font-size: 10px; }
        .act-btn-filled { color: var(--blue); border-color: rgba(96,165,250,0.3); }
        .inline-edit { display: flex; gap: 3px; align-items: center; }
        .edit-input { background: var(--bg3); border: 1px solid var(--accent); color: var(--text); padding: 2px 6px; border-radius: 4px; font-size: 11px; width: 80px; outline: none; }
        .save-btn { background: var(--green2); border: none; color: #000; border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 700; }
        .cancel-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text3); border-radius: 4px; padding: 2px 6px; font-size: 10px; }
        .arrow-note { font-size: 11px; color: var(--text3); font-style: italic; padding-left: 32px; padding-bottom: 3px; }
        /* Export */
        .export-hint { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
        .export-box { width: 100%; min-height: 300px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; padding: 12px; resize: vertical; outline: none; }
        .export-copy { margin-top: 10px; background: linear-gradient(135deg, var(--accent), var(--orange)); border: none; color: #000; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 700; width: 100%; }
        /* Deload banner */
        .deload { margin-top: 14px; padding: 10px 12px; background: rgba(212,164,58,0.08); border: 1px solid rgba(212,164,58,0.2); border-radius: 8px; font-size: 12px; color: var(--accent); }
        /* Utility */
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
// ─── Constants ──────────────────────────────────────────────────────────────
const PROGRAM_START = new Date(2026, 2, 30); // Mon Mar 30
const DAY_ORDER = ["monday","tuesday","wednesday","thursday","friday","saturday","sunday"];
const DAY_LABELS = {monday:"Mon",tuesday:"Tue",wednesday:"Wed",thursday:"Thu",friday:"Fri",saturday:"Sat",sunday:"Sun"};
const INTENSITY_COLORS = {REST:"#444",EASY:"#4ade80","EASY-MOD":"#86efac",MODERATE:"#d4a43a","MOD-HARD":"#fb923c",HARD:"#f87171"};

// ─── State ──────────────────────────────────────────────────────────────────
const state = {
    currentWeek: 1,
    selectedDay: null,
    view: 'overview',
    checked: JSON.parse(localStorage.getItem('rba_checked') || '{}'),
    weights: JSON.parse(localStorage.getItem('rba_weights') || '{}'),
    notes: JSON.parse(localStorage.getItem('rba_notes') || '{}'),
    editingWeight: null,
    editingNote: null,
};

function save() {
    localStorage.setItem('rba_checked', JSON.stringify(state.checked));
    localStorage.setItem('rba_weights', JSON.stringify(state.weights));
    localStorage.setItem('rba_notes', JSON.stringify(state.notes));
}

// ─── Date helpers ───────────────────────────────────────────────────────────
function getWeekStart(w) { const d = new Date(PROGRAM_START); d.setDate(d.getDate() + (w-1)*7); return d; }
function getDayDate(w, day) { const i = DAY_ORDER.indexOf(day); const d = new Date(getWeekStart(w)); d.setDate(d.getDate()+i); return d; }
function fmt(d) { return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()] + " " + d.getDate(); }
function fmtRange(w) { const s=getWeekStart(w); const e=new Date(s); e.setDate(e.getDate()+6); return fmt(s)+" – "+fmt(e); }
function fmtDay(w,day) { return getDayDate(w,day).getDate().toString(); }

// ─── Phase 0: Reactivation (Weeks 1-2) ─────────────────────────────────────

        {name:"Main Work — 25 min",items:["Goblet Squat — 3×12","DB Floor Press — 3×12","Single-Arm DB Row — 3×10 each","KB Romanian Deadlift — 3×12","Half-Kneeling DB Shoulder Press — 3×10 each"]},
        {name:"Core — 5 min",items:["Dead Bug — 3×10 each side","Front Plank — 2×30s"]},

    sunday: { title:"Dog Walk + Rest", intensity:"REST", duration:"20 min", icon:"😴", blocks:[{name:"",items:["15-20 min easy dog walk. Full rest."]}]},

// ─── Phase 2A: Accelerate (Weeks 7, 9, 11) ─────────────────────────────────
const P2A = {

// ─── Week → Data mapping ────────────────────────────────────────────────────
function getDays(w) {
    if (w <= 2) return P0;
    if (w <= 6) return (w % 2 === 1) ? P1A : P1B;
    return (w % 2 === 1) ? P2A : P2B;
}
function getPhaseLabel(w) {
    if (w <= 2) return "Phase 0 · Reactivation";
    if (w <= 6) return "Phase 1 · Rebuild (" + (w%2===1?"A":"B") + ")";
    return "Phase 2 · Accelerate (" + (w%2===1?"A":"B") + ")";
}
function getDayData(w, day) { return getDays(w)[day] || null; }

// ─── Counting ───────────────────────────────────────────────────────────────
function countDay(w, day) {
    const d = getDayData(w, day); if (!d) return {t:0,d:0};
    let t=0, dn=0;
    d.blocks.forEach((b,bi) => b.items.forEach((item,ii) => {
        if (!item.startsWith("→")) { t++; if (state.checked[`${w}-${day}-${bi}-${ii}`]) dn++; }
    }));
    return {t,d:dn};
}
function countWeek(w) {
    let t=0,d=0; DAY_ORDER.forEach(day => { const c=countDay(w,day); t+=c.t; d+=c.d; }); return {t,d,pct:t?Math.round(d/t*100):0};
}
function countProgram() {
    let t=0,d=0; for(let w=1;w<=12;w++){const c=countWeek(w);t+=c.t;d+=c.d;} return {t,d,pct:t?Math.round(d/t*100):0};
}

// ─── Export with exercise groupings ─────────────────────────────────────────
function generateExport() {
    const prog = countProgram();
    let out = "# rba | fit — Progress Export\n";
    out += "Generated: " + new Date().toLocaleDateString() + "\n";
    out += "Program: " + prog.d + "/" + prog.t + " (" + prog.pct + "%)\n\n";

    // Collect weight data by exercise group
    const groupWeights = {};
    for (let w=1; w<=12; w++) {
        DAY_ORDER.forEach(day => {
            const d = getDayData(w, day); if (!d) return;
            d.blocks.forEach((b,bi) => b.items.forEach((item,ii) => {
                const k = `${w}-${day}-${bi}-${ii}`;
                const wt = state.weights[k];
                if (wt) {
                    const grp = getExerciseGroup(item) || item.split("—")[0].trim();
                    if (!groupWeights[grp]) groupWeights[grp] = [];
                    groupWeights[grp].push({ week: w, day: DAY_LABELS[day], date: fmt(getDayDate(w,day)), exercise: item.split("—")[0].trim(), weight: wt });
                }
            }));
        });
    }

    // Weight progression by group
    if (Object.keys(groupWeights).length > 0) {
        out += "## Weight Progression by Exercise Group\n";
        Object.entries(groupWeights).forEach(([grp, entries]) => {
            out += "\n### " + grp + "\n";
            entries.forEach(e => { out += "  Wk" + e.week + " " + e.date + " " + e.day + " — " + e.exercise + ": " + e.weight + "\n"; });
        });
        out += "\n";
    }

    // Weekly completion
    out += "## Weekly Completion\n";
    for (let w=1; w<=12; w++) {
        const wk = countWeek(w);
        if (wk.d === 0) continue;
        out += "\n### Week " + w + " — " + getPhaseLabel(w) + " — " + fmtRange(w) + " — " + wk.d + "/" + wk.t + " (" + wk.pct + "%)\n";
        DAY_ORDER.forEach(day => {
            const d = getDayData(w, day); if (!d) return;
            const c = countDay(w, day);
            if (c.d > 0) {
                out += "  " + DAY_LABELS[day] + " " + fmt(getDayDate(w,day)) + " — " + d.title + ": " + c.d + "/" + c.t + "\n";
                d.blocks.forEach((b,bi) => b.items.forEach((item,ii) => {
                    const k = `${w}-${day}-${bi}-${ii}`;
                    if (state.checked[k]) {
                        out += "    ✓ " + item;
                        if (state.weights[k]) out += " [" + state.weights[k] + "]";
                        if (state.notes[k]) out += " — " + state.notes[k];
                        out += "\n";
                    }
                }));
            }
        });
    }
    return out;
}

// ─── Current week calculation ───────────────────────────────────────────────
function getCurrentWeek() {
    const today = new Date(); today.setHours(0,0,0,0);
    const start = new Date(PROGRAM_START); start.setHours(0,0,0,0);
    if (today < start) return 1;
    const diff = Math.floor((today - start) / (1000*60*60*24));
    const w = Math.floor(diff / 7) + 1;
    return Math.max(1, Math.min(12, w));
}

// ─── Render ─────────────────────────────────────────────────────────────────
function render() {
    const app = document.getElementById('app');
    if (state.view === 'overview') renderOverview(app);
    else if (state.view === 'workout') renderWorkout(app);
    else if (state.view === 'export') renderExport(app);
}

        <div class="int-map">

            <div class="int-row">

        </div>

        <div class="day-cards">
            ${DAY_ORDER.map(day => {
                const d = getDayData(w, day);
                if (!d) return '';
                const c = countDay(w, day);
                const pct = c.t ? Math.round(c.d/c.t*100) : 0;
                const dateStr = fmtDay(w, day);

                                <div class="day-card-title">${d.title}</div>
                            </div>
                            <div class="day-card-right">
                                <span class="badge" style="background:${INTENSITY_COLORS[d.intensity]||'#444'}">${d.intensity}</span>
                                <span class="day-card-dur">${d.duration}</span>
                            </div>
                        </div>
                        ${c.t > 0 ? `<div class="day-prog"><div class="day-prog-track"><div class="day-prog-fill" style="width:${pct}%"></div></div><span class="day-prog-pct">${c.d}/${c.t}</span></div>` : ''}
                    </button>
                `;
            }).join('')}
        </div>

        ${w===10?'<div class="deload">⚠️ <strong>Deload Week.</strong> Drop volume 40%, keep weights same.</div>':''}

}

function renderWorkout(app) {
    const w = state.currentWeek;
    const day = state.selectedDay;
    const d = getDayData(w, day);
    if (!d) { state.view='overview'; render(); return; }

    app.innerHTML = `

            <button class="back-btn" onclick="backToOverview()">← Back</button>
            <div>
                <div class="detail-title">${d.icon} ${d.title}</div>

                    Week ${w} · ${DAY_LABELS[day]} ${dateStr}
                    <span class="badge" style="background:${INTENSITY_COLORS[d.intensity]}">${d.intensity}</span>
                    <span style="color:var(--text3)">${d.duration}</span>
                </div>
                ${d.equip ? `<div class="equip-note">Bring: ${d.equip}</div>` : ''}
            </div>
        </div>
        <div>
            ${d.blocks.map((block, bi) => `
                <div class="block">
                    ${block.name ? `<div class="block-name">${block.name}</div>` : ''}
                    ${block.items.map((item, ii) => {
                        if (item.startsWith("→")) return `<div class="arrow-note">${item}</div>`;
                        const k = `${w}-${day}-${bi}-${ii}`;
                        const done = !!state.checked[k];
                        const wt = state.weights[k];
                        const nt = state.notes[k];
                        return `
                            <div class="item ${done?'item-done':''}">
                                <button class="chk" style="color:${done?'var(--green)':'var(--text3)'}" onclick="toggleCheck('${k}')">${done?'✓':'○'}</button>
                                <div style="flex:1;min-width:0">
                                    <div class="item-text">${item}</div>
                                    <div class="item-acts">
                                        <button class="${wt?'act-btn act-btn-filled':'act-btn'}" onclick="editWeight('${k}','${(wt||'').replace(/'/g,"\\'")}')">${wt?'⚖ '+wt:'+weight'}</button>
                                        <button class="${nt?'act-btn act-btn-filled':'act-btn'}" onclick="editNote('${k}','${(nt||'').replace(/'/g,"\\'")}')">${nt?'📝 '+(nt.length>18?nt.substring(0,18)+'…':nt):'+note'}</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}

            `).join('')}

}

function renderExport(app) {
    const txt = generateExport();
    app.innerHTML = `
        <div class="detail-header">
            <button class="back-btn" onclick="backToOverview()">← Back</button>
            <div class="detail-title">Export Progress</div>
        </div>
        <p class="export-hint">Copy and paste into a chat with Claude to review progress and adjust the program.</p>
        <textarea class="export-box" readonly onclick="this.select()">${txt}</textarea>
        <button class="export-copy" onclick="navigator.clipboard?.writeText(document.querySelector('.export-box').value)">Copy to Clipboard</button>
    `;
}

// ─── Actions ────────────────────────────────────────────────────────────────
function changeWeek(d) { const nw=state.currentWeek+d; if(nw>=1&&nw<=12){state.currentWeek=nw;render();window.scrollTo(0,0);} }
function goWeek(w) { state.currentWeek=w; render(); window.scrollTo(0,0); }
function jumpToToday() { state.currentWeek=getCurrentWeek(); render(); window.scrollTo(0,0); }
function selectDay(day) { state.selectedDay=day; state.view='workout'; render(); window.scrollTo(0,0); }
function backToOverview() { state.view='overview'; render(); window.scrollTo(0,0); }
function showExport() { state.view='export'; render(); window.scrollTo(0,0); }

function toggleCheck(k) {
    state.checked[k] = !state.checked[k];
    if (!state.checked[k]) delete state.checked[k];
    save(); render();
}

function editWeight(k, current) {
    const val = prompt('Weight (e.g. 35lb, 2x25lb):', current || '');
    if (val !== null && val.trim()) { state.weights[k] = val.trim(); save(); render(); }
    else if (val === '') { delete state.weights[k]; save(); render(); }
}

function editNote(k, current) {
    const val = prompt('Note:', current || '');
    if (val !== null && val.trim()) { state.notes[k] = val.trim(); save(); render(); }
    else if (val === '') { delete state.notes[k]; save(); render(); }
}

// ─── Init ───────────────────────────────────────────────────────────────────
state.currentWeek = getCurrentWeek();
render();
